<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #c8f542;
      --danger: #ff4d4d;
      --radius: 8px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 32px;
      color: var(--accent);
    }

    .date-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .date-nav button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s;
    }

    .date-nav button:hover { border-color: var(--accent); }

    .date-display { flex: 1; text-align: center; }

    .date-display .day-name {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .date-display .date-label { font-size: 18px; font-weight: 600; }
    .date-display .date-label.today { color: var(--accent); }

    .week-strip {
      display: flex;
      gap: 6px;
      margin-bottom: 32px;
    }

    .week-day {
      flex: 1;
      text-align: center;
      padding: 8px 4px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      cursor: pointer;
      background: var(--surface);
      transition: border-color 0.15s, background 0.15s;
    }

    .week-day:hover { border-color: var(--accent); }

    .week-day.active {
      border-color: var(--accent);
      background: rgba(200, 245, 66, 0.08);
    }

    .week-day .wd-name {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
    }

    .week-day.active .wd-name { color: var(--accent); }

    .week-day .wd-num { font-size: 15px; font-weight: 600; margin-top: 2px; }

    .week-day .wd-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      margin: 4px auto 0;
      opacity: 0;
    }

    .week-day.has-data .wd-dot { opacity: 1; }

    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .add-form input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-form input:focus { border-color: var(--accent); }
    .add-form input::placeholder { color: var(--muted); }

    .input-exercise { flex: 2; }
    .input-weight   { flex: 1; min-width: 80px; }
    .input-reps     { flex: 1; min-width: 80px; }

    .add-form button {
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    .add-form button:hover { opacity: 0.85; }

    .exercise-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .exercise-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      animation: slideIn 0.15s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .exercise-item input {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      min-width: 0;
    }

    .exercise-item input:hover  { border-color: var(--border); }
    .exercise-item input:focus  { border-color: var(--accent); background: rgba(255,255,255,0.04); }

    .exercise-item .in-name   { flex: 2; font-weight: 500; }
    .exercise-item .in-weight { flex: 1; color: var(--muted); }
    .exercise-item .in-weight:focus { color: var(--text); }
    .exercise-item .in-reps   { flex: 1; color: var(--accent); font-weight: 600; }

    .ex-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .ex-delete:hover { color: var(--danger); }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      font-size: 14px;
    }

    .summary {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 24px;
    }

    .summary-stat { font-size: 13px; color: var(--muted); }
    .summary-stat span { color: var(--text); font-weight: 600; }
  </style>
</head>
<body>
<div class="container">
  <h1>Workout Tracker</h1>

  <div class="date-nav">
    <button id="prevWeek">&#8249;</button>
    <div class="date-display">
      <div class="day-name" id="dayName"></div>
      <div class="date-label" id="dateLabel"></div>
    </div>
    <button id="nextWeek">&#8250;</button>
  </div>

  <div class="week-strip" id="weekStrip"></div>

  <form class="add-form" id="addForm">
    <input class="input-exercise" type="text" id="inputExercise" placeholder="Exercise (e.g. Bench Press)" autocomplete="off" required />
    <input class="input-weight"   type="text" id="inputWeight"   placeholder="Weight (e.g. 135 lbs)"      autocomplete="off" />
    <input class="input-reps"     type="text" id="inputReps"     placeholder="Sets × Reps"                autocomplete="off" required />
    <button type="submit">Add</button>
  </form>

  <div class="exercise-list" id="exerciseList"></div>

  <div class="summary" id="summary" style="display:none">
    <div class="summary-stat">Exercises: <span id="statExercises">0</span></div>
    <div class="summary-stat">Total reps: <span id="statReps">0</span></div>
  </div>
</div>

<script>
  const DAY_NAMES      = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const DAY_NAMES_LONG = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

  let selectedDate = new Date();
  let weekStart    = startOfWeek(selectedDate);

  function dateKey(d) {
    // Local YYYY-MM-DD without UTC conversion
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function startOfWeek(d) {
    const diff = (d.getDay() + 6) % 7;
    const mon  = new Date(d);
    mon.setDate(d.getDate() - diff);
    return mon;
  }

  function addDays(d, n) {
    const r = new Date(d);
    r.setDate(r.getDate() + n);
    return r;
  }

  function formatDateLabel(d) {
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function parseReps(s) {
    const m = s.trim().match(/^(\d+)\s*[x×]\s*(\d+)$/i);
    if (m) return parseInt(m[1]) * parseInt(m[2]);
    const n = parseInt(s);
    return isNaN(n) ? 0 : n;
  }

  async function render() {
    const selKey      = dateKey(selectedDate);
    const weekEndKey  = dateKey(addDays(weekStart, 6));
    const weekStartKey = dateKey(weekStart);
    const today       = dateKey(new Date());

    const [exercises, dotDates] = await Promise.all([
      fetch(`/api/day/${selKey}`).then(r => r.json()),
      fetch(`/api/week-dots?start=${weekStartKey}&end=${weekEndKey}`).then(r => r.json()),
    ]);

    // Header
    const dow = (selectedDate.getDay() + 6) % 7;
    document.getElementById('dayName').textContent = DAY_NAMES_LONG[dow];
    const dl = document.getElementById('dateLabel');
    dl.textContent = formatDateLabel(selectedDate);
    dl.className   = 'date-label' + (selKey === today ? ' today' : '');

    // Week strip
    const strip = document.getElementById('weekStrip');
    strip.innerHTML = '';
    for (let i = 0; i < 7; i++) {
      const d   = addDays(weekStart, i);
      const key = dateKey(d);
      const div = document.createElement('div');
      div.className = 'week-day'
        + (key === selKey         ? ' active'   : '')
        + (dotDates.includes(key) ? ' has-data' : '');
      div.innerHTML = `
        <div class="wd-name">${DAY_NAMES[i]}</div>
        <div class="wd-num">${d.getDate()}</div>
        <div class="wd-dot"></div>
      `;
      div.addEventListener('click', () => { selectedDate = new Date(d); render(); });
      strip.appendChild(div);
    }

    // Exercise list
    const list = document.getElementById('exerciseList');
    list.innerHTML = '';

    if (exercises.length === 0) {
      const empty = document.createElement('div');
      empty.className   = 'empty-state';
      empty.textContent = 'No exercises logged yet.';
      list.appendChild(empty);
      document.getElementById('summary').style.display = 'none';
      return;
    }

    exercises.forEach(entry => {
      const item = document.createElement('div');
      item.className = 'exercise-item';

      const inName   = makeInput('in-name',   entry.name,   'Exercise');
      const inWeight = makeInput('in-weight', entry.weight, 'Weight');
      const inReps   = makeInput('in-reps',   entry.reps,   'Sets × Reps');

      async function saveEntry() {
        await fetch(`/api/exercises/${entry.id}`, {
          method:  'PUT',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ name: inName.value.trim(), weight: inWeight.value.trim(), reps: inReps.value.trim() }),
        });
        refreshSummary();
      }

      [inName, inWeight, inReps].forEach(inp => inp.addEventListener('blur', saveEntry));

      const del = document.createElement('button');
      del.className   = 'ex-delete';
      del.textContent = '×';
      del.addEventListener('click', async () => {
        await fetch(`/api/exercises/${entry.id}`, { method: 'DELETE' });
        render();
      });

      item.append(inName, inWeight, inReps, del);
      list.appendChild(item);
    });

    showSummary(exercises);
  }

  function refreshSummary() {
    const inputs = document.querySelectorAll('.exercise-item .in-reps');
    const reps   = [...inputs].map(i => parseReps(i.value));
    document.getElementById('statReps').textContent = reps.reduce((a,b)=>a+b,0) || '—';
  }

  function showSummary(entries) {
    const total = entries.reduce((s, e) => s + parseReps(e.reps), 0);
    document.getElementById('statExercises').textContent = entries.length;
    document.getElementById('statReps').textContent      = total || '—';
    document.getElementById('summary').style.display     = 'flex';
  }

  function makeInput(cls, value, placeholder) {
    const inp = document.createElement('input');
    inp.type        = 'text';
    inp.className   = cls;
    inp.value       = value;
    inp.placeholder = placeholder;
    inp.autocomplete = 'off';
    return inp;
  }

  document.getElementById('addForm').addEventListener('submit', async e => {
    e.preventDefault();
    const name   = document.getElementById('inputExercise').value.trim();
    const weight = document.getElementById('inputWeight').value.trim();
    const reps   = document.getElementById('inputReps').value.trim();
    if (!name || !reps) return;

    await fetch('/api/exercises', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ date: dateKey(selectedDate), name, weight, reps }),
    });

    document.getElementById('inputExercise').value = '';
    document.getElementById('inputWeight').value   = '';
    document.getElementById('inputReps').value     = '';
    document.getElementById('inputExercise').focus();
    render();
  });

  document.getElementById('prevWeek').addEventListener('click', () => { weekStart = addDays(weekStart, -7); render(); });
  document.getElementById('nextWeek').addEventListener('click', () => { weekStart = addDays(weekStart,  7); render(); });

  render();
</script>
</body>
</html>
